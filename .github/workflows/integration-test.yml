name: Integration test
run-name: ${{ github.actor }} Integration test
on:
  push:
    branches:
      - main

jobs:
  Integration-Test-Linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Mount bazel cache
        uses: actions/cache@v3
        with:
          path: "~/.cache/bazel"
          key: bazel_debian_integration-${{ hashFiles('WORKSPACE', 'BUILD.bazel') }}
      - name: Run integration test
        run: bash scripts/run_integration_test.sh

  Integration-Test-MacOs:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        # gcc provides gfortran (required by armadillo/linear-algebra targets).
        # cmake is required by rules_foreign_cc cmake() rules.
        run: brew install gcc cmake
      - name: Mount bazel cache
        uses: actions/cache@v3
        with:
          path: "~/.cache/bazel"
          key: bazel_macos_integration-${{ hashFiles('WORKSPACE', 'BUILD.bazel') }}
      - name: Run integration test
        run: bash scripts/run_integration_test.sh
